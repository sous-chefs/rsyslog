---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  channel: stable
  install_strategy: once
  chef_license: accept
  enforce_idempotency: <%= ENV['ENFORCE_IDEMPOTENCY'] || true %>
  multiple_converge: <%= ENV['MULTIPLE_CONVERGE'] || 2 %>
  deprecations_as_errors: true
  log_level: <%= ENV['CHEF_LOG_LEVEL'] || 'auto' %>

verifier:
  name: inspec
  sudo: true

platforms:
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-12
  - name: fedora-latest
  - name: rockylinux-9
  - name: ubuntu-22.04
  - name: ubuntu-24.04

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  client: &client_run_list
    - recipe[test::client]
  relp: &relp_run_list
    - recipe[test::relp]
  server: &server_run_list
    - recipe[test::server]
  input_file: &input_file_run_list
    - recipe[test::input_file]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  client: &client_verifier
    inspec_tests:
      - path: test/integration/client
  relp: &relp_verifier
    inspec_tests:
      - path: test/integration/relp
  server: &server_verifier
    inspec_tests:
      - path: test/integration/server
  input_file: &input_file_verifier
    inspec_tests:
      - path: test/integration/input_file

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier

  - name: relp
    run_list: *relp_run_list
    verifier: *relp_verifier

  - name: client
    run_list: *client_run_list
    verifier: *client_verifier

  - name: server
    run_list: *server_run_list
    verifier: *server_verifier

  - name: input-file
    run_list: *input_file_run_list
    verifier: *input_file_verifier
